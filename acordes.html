<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clases de Guitarra</title>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding-top: 80px;
            margin: 0;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        /* Contenedor para alinear los botones uno al lado del otro */
        .contenedor-botones {
            display: flex;
            justify-content: center;
            gap: 30px; /* Espacio entre los botones */
            flex-wrap: wrap; /* Permite que se acomoden en pantallas pequeñas */
        }

        .boton-video {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.5em;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .boton-video:hover {
            background-color: #c0392b;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <h1>🎸 Curso de guitarra de los sábados 🎶</h1>
    
    <div class="contenedor-botones">
        <button id="btnVideo1" class="boton-video">
            ▶️ VIDEO 1
        </button>

        <button id="btnVideo2" class="boton-video">
            ▶️ VIDEO 2
        </button>
    </div>

    <script>
        /* =========================================
           CONFIGURACIÓN DEL PRIMER BOTÓN
           ========================================= */
        const boton1 = document.getElementById('btnVideo1');
        
        boton1.addEventListener('click', function() {
            // Reemplaza el enlace de abajo por el de tu primer video
            const urlVideo1 = 'https://www.youtube.com/watch?v=l3YyTCqwIn0'; 
            window.open(urlVideo1, '_blank');
        });

        /* =========================================
           CONFIGURACIÓN DEL SEGUNDO BOTÓN
           ========================================= */
        const boton2 = document.getElementById('btnVideo2');
        
        boton2.addEventListener('click', function() {
            // Reemplaza el enlace de abajo por el de tu segundo video
            const urlVideo2 = 'https://www.youtube.com/watch?v=UzvuN6oeY_U'; 
            window.open(urlVideo2, '_blank');
        });
    </script>

</body>
</html>
